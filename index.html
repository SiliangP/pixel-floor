<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Floor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: monospace; }
  h1 { color: #e0e0e0; margin-bottom: 12px; font-size: 14px; letter-spacing: 2px; }
  p.hint { color: #888; font-size: 11px; margin-bottom: 16px; }
  canvas { border: 2px solid #333; cursor: crosshair; image-rendering: pixelated; }
  .tooltip { position: fixed; background: #222; color: #0f0; padding: 4px 10px; font-family: monospace; font-size: 12px; pointer-events: none; display: none; border: 1px solid #0f0; z-index: 10; }
</style>
</head>
<body>
<h1>▓ PIXEL FLOOR ▓</h1>
<p class="hint">click a character → bing search</p>
<canvas id="scene"></canvas>
<div class="tooltip" id="tooltip"></div>
<script>
const SCALE = 3;
const W = 320, H = 200;
const canvas = document.getElementById('scene');
const ctx = canvas.getContext('2d');
canvas.width = W * SCALE;
canvas.height = H * SCALE;
ctx.imageSmoothingEnabled = false;

// Off-screen buffer at native res
const buf = document.createElement('canvas');
buf.width = W; buf.height = H;
const bx = buf.getContext('2d');

function px(x, y, color) {
  bx.fillStyle = color;
  bx.fillRect(x, y, 1, 1);
}

function rect(x, y, w, h, color) {
  bx.fillStyle = color;
  bx.fillRect(x, y, w, h);
}

// --- Characters ---
const characters = [];

function addChar(name, query, x, y, drawFn) {
  characters.push({ name, query, x, y, w: 0, h: 0, draw: drawFn });
}

// 1. Pyramid Head (Silent Hill)
addChar('Pyramid Head', 'Silent Hill Pyramid Head', 30, 120, function(ox, oy) {
  // body
  rect(ox+2, oy+8, 8, 12, '#8B0000');
  // pyramid head
  rect(ox, oy, 12, 8, '#C0392B');
  rect(ox+1, oy, 10, 2, '#A93226');
  // legs
  rect(ox+3, oy+20, 3, 4, '#555');
  rect(ox+7, oy+20, 3, 4, '#555');
  // great knife
  rect(ox+12, oy+10, 14, 2, '#aaa');
  rect(ox+12, oy+9, 2, 4, '#888');
  this.w = 26; this.h = 24;
});

// 2. Mario
addChar('Mario', 'Super Mario gameplay', 80, 122, function(ox, oy) {
  // hat
  rect(ox+2, oy, 8, 3, '#E74C3C');
  rect(ox+1, oy+2, 10, 2, '#E74C3C');
  // face
  rect(ox+2, oy+4, 8, 4, '#F5CBA7');
  px(ox+3, oy+5, '#333'); px(ox+7, oy+5, '#333'); // eyes
  rect(ox+4, oy+7, 4, 1, '#C0392B'); // mustache
  // body
  rect(ox+1, oy+8, 10, 6, '#E74C3C');
  rect(ox+3, oy+9, 6, 4, '#3498DB'); // overalls
  // legs
  rect(ox+2, oy+14, 3, 4, '#3498DB');
  rect(ox+7, oy+14, 3, 4, '#3498DB');
  // shoes
  rect(ox+1, oy+18, 4, 2, '#8B4513');
  rect(ox+7, oy+18, 4, 2, '#8B4513');
  this.w = 12; this.h = 20;
});

// 3. Pikachu
addChar('Pikachu', 'Pikachu Pokemon', 140, 126, function(ox, oy) {
  // body
  rect(ox+2, oy+4, 10, 8, '#F1C40F');
  // head
  rect(ox+3, oy+0, 8, 6, '#F1C40F');
  // ears
  rect(ox+2, oy-4, 2, 5, '#F1C40F');
  px(ox+2, oy-4, '#333');
  rect(ox+10, oy-4, 2, 5, '#F1C40F');
  px(ox+11, oy-4, '#333');
  // eyes
  px(ox+5, oy+2, '#333'); px(ox+9, oy+2, '#333');
  // cheeks
  px(ox+3, oy+3, '#E74C3C'); px(ox+10, oy+3, '#E74C3C');
  // tail
  rect(ox+12, oy+2, 2, 2, '#F1C40F');
  rect(ox+14, oy+0, 2, 3, '#F1C40F');
  rect(ox+16, oy-1, 2, 2, '#F1C40F');
  // feet
  rect(ox+3, oy+12, 3, 2, '#F1C40F');
  rect(ox+8, oy+12, 3, 2, '#F1C40F');
  this.w = 18; this.h = 18;
});

// 4. Among Us Crewmate
addChar('Crewmate', 'Among Us', 200, 128, function(ox, oy) {
  // body
  rect(ox+2, oy+2, 8, 10, '#E74C3C');
  rect(ox+1, oy+4, 10, 6, '#E74C3C');
  // visor
  rect(ox+6, oy+3, 5, 4, '#85C1E9');
  // backpack
  rect(ox, oy+4, 2, 5, '#C0392B');
  // legs
  rect(ox+2, oy+12, 3, 3, '#E74C3C');
  rect(ox+7, oy+12, 3, 3, '#E74C3C');
  this.w = 12; this.h = 15;
});

// 5. Pac-Man
addChar('Pac-Man', 'Pac-Man game', 250, 130, function(ox, oy) {
  rect(ox+2, oy, 8, 2, '#F1C40F');
  rect(ox+1, oy+2, 10, 2, '#F1C40F');
  rect(ox, oy+4, 12, 4, '#F1C40F');
  rect(ox+1, oy+8, 10, 2, '#F1C40F');
  rect(ox+2, oy+10, 8, 2, '#F1C40F');
  // mouth
  rect(ox+8, oy+4, 4, 2, '#1a1a2e');
  rect(ox+10, oy+3, 2, 1, '#1a1a2e');
  rect(ox+10, oy+7, 2, 1, '#1a1a2e');
  // eye
  px(ox+4, oy+2, '#333');
  // ghost nearby
  rect(ox+18, oy+1, 8, 9, '#E67E22');
  rect(ox+19, oy, 6, 1, '#E67E22');
  rect(ox+18, oy+10, 2, 2, '#E67E22');
  rect(ox+21, oy+10, 2, 2, '#E67E22');
  rect(ox+24, oy+10, 2, 2, '#E67E22');
  px(ox+20, oy+3, '#fff'); px(ox+24, oy+3, '#fff');
  px(ox+21, oy+4, '#33f'); px(ox+25, oy+4, '#33f');
  this.w = 12; this.h = 12;
});

// 6. Creeper (Minecraft)
addChar('Creeper', 'Minecraft Creeper', 170, 118, function(ox, oy) {
  // head
  rect(ox, oy, 12, 12, '#4CAF50');
  rect(ox+1, oy+1, 10, 10, '#66BB6A');
  // face
  px(ox+3, oy+3, '#1B5E20'); px(ox+4, oy+3, '#1B5E20');
  px(ox+7, oy+3, '#1B5E20'); px(ox+8, oy+3, '#1B5E20');
  px(ox+3, oy+4, '#1B5E20'); px(ox+8, oy+4, '#1B5E20');
  rect(ox+5, oy+5, 2, 2, '#1B5E20');
  rect(ox+4, oy+7, 4, 2, '#1B5E20');
  rect(ox+3, oy+8, 2, 2, '#1B5E20');
  rect(ox+7, oy+8, 2, 2, '#1B5E20');
  // body
  rect(ox+2, oy+12, 8, 8, '#4CAF50');
  // legs
  rect(ox+2, oy+20, 3, 4, '#388E3C');
  rect(ox+7, oy+20, 3, 4, '#388E3C');
  this.w = 12; this.h = 24;
});

// --- Scene ---
function drawScene() {
  // sky
  rect(0, 0, W, 80, '#16213E');
  // stars
  const stars = [[10,10],[50,25],[90,15],[150,30],[200,8],[260,20],[300,12],[45,50],[180,55],[280,45]];
  stars.forEach(([sx,sy]) => px(sx, sy, '#fff'));

  // building bg
  rect(0, 60, W, 10, '#2C3E50');
  rect(0, 70, W, 130, '#1C2833');
  
  // floor lines
  for (let i = 0; i < W; i += 20) {
    rect(i, 70, 1, 130, '#2C3E50');
  }
  rect(0, 145, W, 1, '#2C3E50');
  rect(0, 100, W, 1, '#2C3E50');
  
  // windows
  for (let wx = 10; wx < W; wx += 40) {
    rect(wx, 75, 12, 15, '#F39C12');
    rect(wx+1, 76, 10, 13, '#F7DC6F');
    // window cross
    rect(wx+5, 76, 2, 13, '#F39C12');
    rect(wx+1, 82, 10, 1, '#F39C12');
  }

  // floor / ground
  rect(0, 148, W, 52, '#34495E');
  for (let fx = 0; fx < W; fx += 16) {
    rect(fx, 148, 1, 52, '#2C3E50');
  }
  for (let fy = 148; fy < 200; fy += 8) {
    rect(0, fy, W, 1, '#2C3E50');
  }

  // pipes
  rect(120, 135, 6, 13, '#7F8C8D');
  rect(118, 133, 10, 4, '#95A5A6');

  // crates
  rect(215, 138, 10, 10, '#8B6914');
  rect(216, 139, 8, 8, '#A07828');
  rect(220, 139, 1, 8, '#8B6914');
  rect(216, 143, 8, 1, '#8B6914');

  // Draw characters
  characters.forEach(c => c.draw(c.x, c.y));
}

drawScene();

// Scale up
ctx.drawImage(buf, 0, 0, W, H, 0, 0, W * SCALE, H * SCALE);

// --- Interaction ---
const tooltip = document.getElementById('tooltip');

canvas.addEventListener('mousemove', (e) => {
  const rect2 = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect2.left) / SCALE;
  const my = (e.clientY - rect2.top) / SCALE;

  let hit = null;
  for (const c of characters) {
    if (mx >= c.x && mx <= c.x + c.w && my >= c.y && my <= c.y + c.h) {
      hit = c; break;
    }
  }

  if (hit) {
    canvas.style.cursor = 'pointer';
    tooltip.style.display = 'block';
    tooltip.textContent = '🔍 ' + hit.name;
    tooltip.style.left = (e.clientX + 12) + 'px';
    tooltip.style.top = (e.clientY - 24) + 'px';
  } else {
    canvas.style.cursor = 'crosshair';
    tooltip.style.display = 'none';
  }
});

canvas.addEventListener('click', (e) => {
  const rect2 = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect2.left) / SCALE;
  const my = (e.clientY - rect2.top) / SCALE;

  for (const c of characters) {
    if (mx >= c.x && mx <= c.x + c.w && my >= c.y && my <= c.y + c.h) {
      // Try Bing video search first
      const q = encodeURIComponent(c.query);
      window.open(`https://www.bing.com/videos/search?q=${q}`, '_blank');
      return;
    }
  }
});

canvas.addEventListener('mouseleave', () => {
  tooltip.style.display = 'none';
});
</script>
</body>
</html>
